		<script>
			(function () {
				const path = window.location.pathname || '/';
				const basePath =
					path === '/'
						? '/'
						: /\.[^/]+$/.test(path)
						? path.replace(/[^/]*$/, '') || '/'
						: `${path.replace(/\/+$/, '')}/`;
				const base = document.createElement('base');
				base.href = basePath;
				document.head.appendChild(base);
			})();
		</script>

		<style>
			#app-loader {
				position: fixed;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				z-index: 9999;
			}

			#app-loader svg {
				width: 35px;
				height: 35px;
				animation: open 150ms cubic-bezier(0, 0, 0.2, 1) 0ms;
			}

			@keyframes open {
				0% {
					opacity: 0;
				}
				100% {
					opacity: 1;
				}
			}
		</style>
		<script>
			const themeBackgrounds = {
				'light-primary': '#FFFFFF',
				'light-alt-1': '#FEFEFE',
				'light-alt-2': '#FFFFFF',
				'light-alt-3': '#f1f1f1',
				'dark-primary': '#171717',
				'dark-alt-1': '#16161C',
				'dark-alt-2': '#17191f',
				'dark-alt-3': '#17181C',
			};

			function getTheme() {
				try {
					const settings = localStorage.getItem('settings');
					if (settings) {
						const parsed = JSON.parse(settings);
						return parsed.theme;
					}
				} catch (e) {}

				return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
					? 'dark-primary'
					: 'light-primary';
			}

			const theme = getTheme();
			const backgroundColor = themeBackgrounds[theme] || themeBackgrounds['dark-primary'];
			document.body.style.background = backgroundColor;

			const isDarkTheme = theme.startsWith('dark');
			const iconColor = isDarkTheme ? '#EBEBEB' : '#444444';
			const loaderIcon = document.querySelector('#app-loader svg');

			if (loaderIcon) {
				loaderIcon.style.fill = iconColor;
			}

			window.hideAppLoader = function () {
				const loader = document.getElementById('app-loader');
				if (loader) {
					loader.style.display = 'none';
				}
			};
		</script>
